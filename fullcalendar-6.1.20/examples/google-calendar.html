<!DOCTYPE html>
<html>
<head>
  <meta charset='utf-8' />

  <!-- FullCalendar v6 CSS -->
  <link href='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.20/index.global.min.css' rel='stylesheet' />

  <!-- FullCalendar v6 JS -->
  <script src='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.20/index.global.min.js'></script>

  <!-- Google Calendar plugin -->
  <script src='https://cdn.jsdelivr.net/npm/@fullcalendar/google-calendar@6.1.20/index.global.min.js'></script>

  <script>
    document.addEventListener('DOMContentLoaded', function () {
      var calendarEl = document.getElementById('calendar');

      var calendar = new FullCalendar.Calendar(calendarEl, {

        initialView: 'dayGridMonth',

        headerToolbar: {
          left: 'prev,next today',
          center: 'title',
          right: 'dayGridMonth,listYear'
        },

        displayEventTime: false,

        googleCalendarApiKey: 'YOUR_API_KEY_HERE',

        events: [
          {
            googleCalendarId: 'en.uk#holiday@group.v.calendar.google.com',
            color: '#d9534f', // red for UK holidays
            textColor: '#ffffff'
          }
        ],

        eventClick: function (info) {
          window.open(info.event.url, 'google-calendar-event', 'width=700,height=600');
          info.jsEvent.preventDefault();
        },

        loading: function (isLoading) {
          document.getElementById('loading').style.display =
            isLoading ? 'block' : 'none';
        }

      });

      calendar.render();
    });
  </script>

  <style>
    body {
      margin: 40px 10px;
      font-family: Arial, Helvetica Neue, Helvetica, sans-serif;
      font-size: 14px;
    }

    #loading {
      display: none;
      position: absolute;
      top: 10px;
      right: 10px;
    }

    #calendar {
      max-width: 900px;
      margin: 0 auto;
    }
  </style>
</head>
<body>

  <div id='loading'>loading...</div>
  <div id='calendar'></div>

</body>
</html>
